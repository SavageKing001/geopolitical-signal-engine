<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geopolitical Signal Engine</title>
  <meta name="description"
    content="Second-order market intelligence through geopolitical signal mapping for small and mid-cap equities.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --bg-hover: #1a1a1a;
      --border: #2a2a2a;
      --border-light: #333333;
      --text-primary: #f5f5f5;
      --text-secondary: #888888;
      --text-muted: #444444;
      --gold: #c9a84c;
      --gold-dim: #8a6f2e;
      --white: #ffffff;
      --red: #cc3333;
      --green: #2d7a2d;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Corner chrome ── */
    .corner-tl {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
    }

    .sys-id {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .corner-tr {
      position: fixed;
      top: 24px;
      right: 32px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .sdot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sdot-on {
      background: #4a7c4a;
    }

    .sdot-mid {
      background: var(--gold-dim);
    }

    /* ── Main layout ── */
    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 96px 24px 80px;
    }

    /* ── Heading block ── */
    .hero-heading {
      text-align: center;
      margin-bottom: 18px;
    }

    .hero-line-1 {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 68px);
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .hero-line-2 {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 4.5vw, 52px);
      font-weight: 300;
      font-style: italic;
      color: var(--text-primary);
      line-height: 1.2;
      letter-spacing: -0.01em;
      opacity: 0.85;
    }

    .hero-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      text-align: center;
      margin-bottom: 36px;
    }

    /* ── Gold divider ── */
    .gold-divider {
      width: 100%;
      max-width: 440px;
      height: 1px;
      background: var(--gold);
      opacity: 0.35;
      margin: 0 auto 44px;
    }

    /* ── Form ── */
    .form-wrap {
      width: 100%;
      max-width: 440px;
    }

    .field {
      margin-bottom: 32px;
    }

    .field-label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    input[type="text"],
    select {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      border-radius: 0;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    input[type="text"] {
      cursor: text;
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
      font-size: 13px;
    }

    input[type="text"]:focus,
    select:focus {
      border-bottom-color: var(--gold);
    }

    select option {
      background: #111111;
      color: var(--text-primary);
    }

    /* ── Submit ── */
    .analyze-btn {
      width: 100%;
      padding: 15px;
      background: var(--bg);
      border: 1px solid var(--white);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.18s, color 0.18s;
    }

    .analyze-btn:hover {
      background: var(--white);
      color: #0a0a0a;
    }

    /* ── Footer ── */
    .page-footer {
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .footer-disclaimer {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-align: center;
    }

    .cmd-link {
      position: fixed;
      bottom: 28px;
      right: 32px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-decoration: none;
      transition: color 0.2s;
    }

    .cmd-link:hover {
      color: var(--gold-dim);
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .corner-tr {
        display: none;
      }

      .corner-tl {
        top: 16px;
        left: 16px;
      }

      .main-wrapper {
        padding: 80px 20px 64px;
      }

      .cmd-link {
        bottom: 20px;
        right: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- Top-left: system label -->
  <div class="corner-tl">
    <span class="sys-id">Geopolitical Signal Engine</span>
  </div>

  <!-- Top-right: status indicators -->
  <div class="corner-tr">
    <span class="status-item"><span class="sdot sdot-on"></span>NEWSAPI</span>
    <span class="status-item"><span class="sdot sdot-mid"></span>REDDIT</span>
    <span class="status-item"><span class="sdot sdot-on"></span>ENGINE</span>
  </div>

  <!-- Main content -->
  <main class="main-wrapper">

    <h1 class="hero-heading">
      <span class="hero-line-1">Market Intelligence</span>
      <span class="hero-line-2">Through Geopolitical Signals</span>
    </h1>

    <p class="hero-sub">Second-order effects in small and mid-cap equities</p>

    <div class="gold-divider"></div>

    <div class="form-wrap">
      <form action="/analyze" method="POST" autocomplete="off">

        <div class="field">
          <label class="field-label" for="keyword">Keyword</label>
          <input type="text" id="keyword" name="keyword" placeholder="e.g. Iran conflict, China tariffs, Ukraine war"
            required>
        </div>

        <div class="field">
          <label class="field-label" for="event_type">Event Type</label>
          <select id="event_type" name="event_type">
            <option value="conflict">Conflict</option>
            <option value="sanction">Sanction</option>
            <option value="trade">Trade Dispute</option>
            <option value="election">Election</option>
            <option value="economic">Economic Crisis</option>
            <option value="natural_disaster">Natural Disaster</option>
          </select>
        </div>

        <div class="field">
          <label class="field-label" for="region">Region</label>
          <select id="region" name="region">
            <option value="Middle East">Middle East</option>
            <option value="Asia">Asia Pacific</option>
            <option value="Europe">Europe</option>
            <option value="Americas">Americas</option>
            <option value="Africa">Africa</option>
            <option value="Global">Global</option>
          </select>
        </div>

        <button type="submit" class="analyze-btn" id="analyze-submit">Analyze</button>

      </form>
    </div>

  </main>

  <footer class="page-footer">
    <p class="footer-disclaimer">Research tool only — not financial advice</p>
  </footer>

  <a class="cmd-link" href="http://127.0.0.1:5001/vaibhav" target="_blank" rel="noopener">→ Command Center</a>

</body>

</html>
