<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geopolitical Signal Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 48px 56px;
      width: 100%;
      max-width: 520px;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.2;
      margin-bottom: 36px;
    }

    h1 span { color: #f59e0b; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 7px;
    }

    .field { margin-bottom: 22px; }

    input[type="text"],
    select {
      width: 100%;
      padding: 11px 14px;
      background: #0f1117;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    select:focus { border-color: #f59e0b; }

    select option { background: #1a1d27; }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 13px;
      background: #f59e0b;
      color: #0f1117;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.4px;
      transition: background 0.15s;
    }

    button:hover { background: #fbbf24; }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">Signal Engine</p>
    <h1>Geopolitical <span>Signal</span> Analyzer</h1>

    <form action="/analyze" method="POST">
      <div class="field">
        <label for="keyword">Keyword / Event Phrase</label>
        <input type="text" id="keyword" name="keyword"
               placeholder="e.g. Iran war, China trade tariffs"
               required>
      </div>

      <div class="field">
        <label for="event_type">Event Type</label>
        <select id="event_type" name="event_type">
          <option value="conflict">Conflict</option>
          <option value="trade">Trade</option>
          <option value="sanction">Sanction</option>
          <option value="election">Election</option>
          <option value="economic">Economic</option>
        </select>
      </div>

      <div class="field">
        <label for="region">Region</label>
        <select id="region" name="region">
          <option value="Middle East">Middle East</option>
          <option value="Asia">Asia</option>
          <option value="Europe">Europe</option>
          <option value="Americas">Americas</option>
          <option value="Africa">Africa</option>
          <option value="Global">Global</option>
        </select>
      </div>

      <button type="submit">Analyze &rarr;</button>
    </form>
  </div>
</body>
</html>
